# JWT secret
wirespeed.clinic.jwtSecret=ClinicConnectVerySecretJWTKeyFor2026WireSpeedClinic_SecurityEnhanced

# See exactly what Spring Security is doing
logging.level.org.springframework.security=DEBUG

# See the actual SQL queries being sent to H2
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# See your own app's internal logic
logging.level.com.wirespeed.clinic=DEBUG

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:clinicdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.datasource.username=sa
spring.datasource.password=

# Application name
spring.application.name=clinic-connect-server

# Base path for all API endpoints
server.servlet.context-path=/api

# H2 Console (dev convenience)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs